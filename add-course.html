<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Add Course</title>
</head>

<body>

<header>
    <h1>Personal Course Organizer</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="courses.html">My Courses</a>
    <a href="add-course.html">Add Course</a>
    <a href="contact.html">Contact Us</a>
</nav>

<main>

    <section>
        <h2>Add new course</h2>
        <form>
            <label for="cname">Course Name</label>
            <input type="text" id="cname" name="cname" placeholder="Enter course name..." required>
            <label for="instructor">Instructor</label>
            <input type="text" id="instructor" name="instructor" placeholder="Enter instructor name..." required>
            <label for="chours">Credit Hours</label>
            <input type="number" id="chours" name="chours" placeholder="Enter credit hours..." required>
            <label for="notes">Notes</label>
            <textarea id="notes" rows="10" cols="30" placeholder="Write notes here..." required></textarea>
            <button type="submit">Submit</button>
        </form>
    </section>

</main>

<footer>
    <p>© 2026 Yahya's Courses Organizer</p>
</footer>

</body>
</html>
